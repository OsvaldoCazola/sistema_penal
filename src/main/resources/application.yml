spring:
  application:
    name: sistema-penal-api
  
  profiles:
    active: ${SPRING_PROFILE:h2}  # Use 'h2' para dev, 'default' para PostgreSQL

  # Banco de Dados PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/sistema_penal
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Groq API (LLM)
  groq:
    api-key: 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
    chat:
      options:
        model: llama-3.3-70b-versatile
        temperature: 0.7

  # Mail (opcional)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# Servidor
server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:c3VhLWNoYXZlLXNlY3JldGEtbXVpdG8tbG9uZ2EtY29tLXBlbG8tbWVub3MtMjU2LWJpdHMtcGFyYS1zZWd1cmFuY2E=}
  expiration-ms: 3600000       # 1 hora em milissegundos
  refresh-expiration-ms: 604800000  # 7 dias em milissegundos

# Logging
logging:
  level:
    root: INFO
    com.api.sistema_penal: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Security/CORS
security:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:4200,http://localhost:5173

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
