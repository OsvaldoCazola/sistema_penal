spring:
  # H2 Database - Perfil para desenvolvimento sem PostgreSQL
  datasource:
    url: jdbc:h2:mem:sistema_penal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    # Não falhar na inicialização se houver erros de DDL
    open-in-view: false

  # Desabilitar Flyway para H2 (usará ddl-auto)
  flyway:
    enabled: false

  # Console H2 habilitado
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # Desabilitar Redis para H2
  data:
    redis:
      repositories:
        enabled: false

# Desabilitar batch para evitar conflito
  batch:
    jdbc:
      initialize-schema: never

  # Groq API (LLM)
  groq:
    api-key: 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
    chat:
      options:
        model: llama-3.3-70b-versatile
        temperature: 0.7
